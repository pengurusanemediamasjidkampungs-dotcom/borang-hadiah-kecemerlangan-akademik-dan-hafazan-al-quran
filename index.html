<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Kecemerlangan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📄 Borang Kecemerlangan</h1>
        
        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>

        <form id="form">
            <div class="card step">
                <h2>Maklumat Diri</h2>
                <label>Nama Penuh</label>
                <input type="text" placeholder="Nama mengikut IC" required>
                
                <label>No IC</label>
                <input type="text" placeholder="Contoh: 01020310xxxx" required>
                
                <div class="grid">
                    <div>
                        <label>Tarikh Lahir</label>
                        <input type="date">
                    </div>
                    <div>
                        <label>Jantina</label>
                        <select>
                            <option value="Lelaki">Lelaki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>
                </div>
                
                <label>Telefon</label>
                <input type="tel" placeholder="Contoh: 0123456789">
            </div>

            <div class="card step hidden">
                <h2>Akademik</h2>
                <label>SPM</label>
                <input type="text" placeholder="Contoh: 5A 3B">
                
                <label>STPM / Diploma</label>
                <input type="text" placeholder="Nama Kursus/Sijil">
                
                <label>CGPA</label>
                <input type="number" step="0.01" placeholder="Contoh: 3.75">
            </div>

            <div class="card step hidden">
                <h2>Hafazan</h2>
                <label>Jumlah Juzuk</label>
                <input type="number" min="0" max="30" placeholder="0-30">
            </div>

            <div class="card step hidden">
                <h2>Pengesahan</h2>
                <p>Saya mengaku bahawa semua maklumat yang diberikan adalah benar dan sahih.</p>
            </div>

            <div class="nav-buttons" style="display:flex; justify-content:space-between; gap: 10px;">
                <button type="button" onclick="prev()">⬅ Back</button>
                <button type="button" onclick="next()">Next ➡</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
