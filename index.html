<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Multi-Step</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form id="form">
        <div class="step">
            <h2>Langkah 1</h2>
            <input type="text" id="ic" placeholder="No. IC" required>
            <input type="number" id="telefon" placeholder="No. Telefon" required>
        </div>

        <div class="navigation">
            <button type="button" onclick="prev()">Kembali</button>
            <button type="button" onclick="next()">Seterusnya</button>
        </div>
    </form>

    <script src="script.js"></script>
</body>
</html>
