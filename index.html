<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borang Kecemerlangan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📄 Borang Kecemerlangan</h1>
        
        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>

        <form id="form">
            <div class="card step">
                <h2>Maklumat Diri</h2>
                <label>Nama Penuh</label>
                <input required>
                <label>No IC</label>
                <input required>
                <div class="grid">
                    <div>
                        <label>Tarikh Lahir</label>
                        <input type="date">
                    </div>
                    <div>
                        <label>Jantina</label>
                        <select>
                            <option>Lelaki</option>
                            <option>Perempuan</option>
                        </select>
                    </div>
                </div>
                <label>Telefon</label>
                <input>
            </div>

            <div class="card step hidden">
                <h2>Akademik</h2>
                <label>SPM</label>
                <input placeholder="Contoh: 5A">
                <label>STPM / Diploma</label>
                <input>
                <label>CGPA</label>
                <input>
            </div>

            <div class="card step hidden">
                <h2>Hafazan</h2>
                <label>Jumlah Juzuk</label>
                <input type="number" max="30">
            </div>

            <div class="card step hidden">
                <h2>Pengesahan</h2>
                <p>Saya mengaku maklumat adalah benar.</p>
            </div>

            <div style="display:flex; justify-content:space-between">
                <button type="button" onclick="prev()">⬅ Back</button>
                <button type="button" onclick="next()">Next ➡</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
